version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: docfusion-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docfusion}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-c log_statement=all -c max_connections=200"
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docfusion-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: docfusion-redis
    command: redis-server --appendonly yes --loglevel debug
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docfusion-network

  # MinIO (S3-compatible storage for local development)
  minio:
    image: minio/minio:latest
    container_name: docfusion-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docfusion-network

  # MailHog (Email testing in development)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: docfusion-mailhog
    ports:
      - '1025:1025'    # SMTP port
      - '8025:8025'    # Web UI
    networks:
      - docfusion-network

  # PgBouncer (Database connection pooling)
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: docfusion-pgbouncer
    environment:
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_MIN_POOL_SIZE: 10
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_RESERVE_POOL_SIZE: 5
    ports:
      - '6432:6432'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/pgbouncer.conf:/etc/pgbouncer/pgbouncer.ini
    networks:
      - docfusion-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  docfusion-network:
    driver: bridge

# Usage:
# docker-compose up -d                    # Start all services
# docker-compose down                     # Stop all services
# docker-compose logs -f [service]        # View logs
# docker-compose ps                       # Check status
#
# Service Connections:
# - PostgreSQL: localhost:5432 (postgres:postgres)
# - Redis: localhost:6379
# - MinIO: localhost:9000 (minioadmin:minioadmin)
# - MinIO Console: http://localhost:9001
# - MailHog: http://localhost:8025
# - PgBouncer: localhost:6432
